version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/schema.sql"
    queries: "internal/db/queries/"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        emit_json_tags: true
        emit_pointers_for_null_types: true
  - engine: "sqlite"
    schema: "internal/stream/databroadcast/cachedb/schema.sql"
    queries: "internal/stream/databroadcast/cachedb/queries.sql"
    gen:
      go:
        package: "cachedb"
        out: "internal/stream/databroadcast/cachedb"
        emit_json_tags: true
