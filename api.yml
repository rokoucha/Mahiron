openapi: 3.1.1
info:
  title: Mahiron API
  description: Yet another DVR Tuner Server for Japanese TV
  contact:
    name: 21S1298001
    url: https://github.com/21S1298001
  version: 5.0.0
servers:
  - url: /api
tags:
  - name: channels
  - name: documents
  - name: events
  - name: iptv
  - name: log
  - name: programs
  - name: services
  - name: status
  - name: stream
  - name: tuners
  - name: version
paths:
  /version:
    get:
      tags:
        - version
      operationId: checkVersion
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /docs:
    get:
      tags:
        - documents
      operationId: getApiDocumentation
      responses:
        "200":
          description: OK
          content:
            application/json: {}
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners:
    get:
      tags:
        - tuners
      operationId: getTuners
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TunerDevice"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /status:
    get:
      tags:
        - status
      summary: Get Status
      operationId: getStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services:
    get:
      tags:
        - services
      operationId: getServices
      parameters:
        - name: serviceId
          in: query
          schema:
            type: integer
        - name: networkId
          in: query
          schema:
            type: integer
        - name: name
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: integer
        - name: channel.type
          in: query
          schema:
            type: string
        - name: channel.channel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /programs:
    get:
      tags:
        - programs
      operationId: getPrograms
      parameters:
        - name: networkId
          in: query
          schema:
            type: integer
        - name: serviceId
          in: query
          schema:
            type: integer
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /log/stream:
    get:
      tags:
        - log
        - stream
      operationId: getLogStream
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /log:
    get:
      tags:
        - log
      operationId: getLog
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /iptv/xmltv:
    get:
      tags:
        - iptv
      summary: IPTV - XMLTV EPG Data
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content:
            text/xml:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/playlist:
    get:
      tags:
        - iptv
      summary: IPTV - M3U Playlist
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content:
            application/x-mpegURL:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/lineup.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/lineup_status.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/discover.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content: {}
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/stream:
    get:
      tags:
        - events
        - stream
      operationId: getEventsStream
      parameters:
        - name: resource
          in: query
          schema:
            type: string
            enum:
              - program
              - service
              - tuner
        - name: type
          in: query
          schema:
            type: string
            enum:
              - create
              - update
              - remove
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events:
    get:
      tags:
        - events
      operationId: getEvents
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels:
    get:
      tags:
        - channels
      operationId: getChannels
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners/{index}/process:
    get:
      tags:
        - tuners
      summary: Get Tuner Process Info
      operationId: getTunerProcess
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TunerProcess"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - tuners
      summary: Kill Tuner Process
      operationId: killTunerProcess
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners/{index}:
    get:
      tags:
        - tuners
      operationId: getTuner
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TunerDevice"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services/{id}/stream:
    get:
      tags:
        - services
        - stream
      operationId: getServiceStream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: 0
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}/programs:
    get:
      tags:
        - programs
        - services
      operationId: getServicePrograms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services/{id}/logo:
    get:
      tags:
        - services
      operationId: getLogoImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
      responses:
        "200":
          description: OK
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Logo Data Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}:
    get:
      tags:
        - services
      operationId: getService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /programs/{id}/stream:
    get:
      tags:
        - programs
        - stream
      operationId: getProgramStream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 655356553565535
            minimum: 10000000000
            type: integer
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: 0
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /programs/{id}:
    get:
      tags:
        - programs
      operationId: getProgram
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 655356553565535
            minimum: 10000000000
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels/{type}/{channel}/stream:
    get:
      tags:
        - channels
        - stream
      operationId: getChannelStream
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: path
          required: true
          schema:
            type: string
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: 0
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /channels/{type}/{channel}/services/{id}/stream:
    get:
      tags:
        - channels
        - services
        - stream
      operationId: getServiceStreamByChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: 0
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /channels/{type}/{channel}/services/{id}:
    get:
      tags:
        - channels
        - services
      operationId: getServiceByChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels/{type}/{channel}/services:
    get:
      tags:
        - channels
        - services
      operationId: getServicesByChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels/{type}/{channel}:
    get:
      tags:
        - channels
      operationId: getChannel
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Channel"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels/{type}:
    get:
      tags:
        - channels
      operationId: getChannelsByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
        reason:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ErrorOfOpenAPI"
    ErrorOfOpenAPI:
      type: object
      properties:
        errorCode:
          type: string
        message:
          type: string
        location:
          type: string
    ProgramId:
      maximum: 655356553565535
      type: integer
    EventId:
      maximum: 65535
      type: integer
    ServiceId:
      maximum: 65535
      type: integer
    NetworkId:
      maximum: 65535
      type: integer
    ServiceItemId:
      maximum: 6553565535
      type: integer
    UnixtimeMS:
      type: integer
    TransportStreamId:
      maximum: 65535
      type: integer
    Channel:
      required:
        - channel
        - type
      type: object
      properties:
        type:
          type: string
        channel:
          type: string
        name:
          type: string
        satellite:
          type: string
        space:
          type: integer
        freq:
          type: number
        polarity:
          type: string
          enum:
            - H
            - V
        tsmfRelTs:
          type: integer
        services:
          type: array
          items:
            $ref: "#/components/schemas/Service"
    Service:
      required:
        - id
        - name
        - networkId
        - serviceId
        - type
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ServiceItemId"
        serviceId:
          $ref: "#/components/schemas/ServiceId"
        networkId:
          $ref: "#/components/schemas/NetworkId"
        transportStreamId:
          $ref: "#/components/schemas/TransportStreamId"
        name:
          type: string
        type:
          type: integer
        logoId:
          type: integer
        hasLogoData:
          type: boolean
        remoteControlKeyId:
          type: integer
        epgReady:
          type: boolean
        epgUpdatedAt:
          $ref: "#/components/schemas/UnixtimeMS"
        channel:
          $ref: "#/components/schemas/Channel"
        logoData:
          type: string
    Program:
      required:
        - duration
        - eventId
        - id
        - isFree
        - networkId
        - serviceId
        - startAt
      type: object
      properties:
        id:
          $ref: "#/components/schemas/ProgramId"
        eventId:
          $ref: "#/components/schemas/EventId"
        serviceId:
          $ref: "#/components/schemas/ServiceId"
        networkId:
          $ref: "#/components/schemas/NetworkId"
        startAt:
          $ref: "#/components/schemas/UnixtimeMS"
        duration:
          type: integer
        isFree:
          type: boolean
        name:
          type: string
        description:
          type: string
        genres:
          type: array
          items:
            $ref: "#/components/schemas/ProgramGenre"
        video:
          type: object
          properties:
            type:
              $ref: "#/components/schemas/ProgramVideoType"
            resolution:
              $ref: "#/components/schemas/ProgramVideoResolution"
            streamContent:
              type: integer
            componentType:
              type: integer
        audios:
          type: array
          items:
            type: object
            properties:
              componentType:
                type: integer
              componentTag:
                type: integer
              isMain:
                type: boolean
              samplingRate:
                $ref: "#/components/schemas/ProgramAudioSamplingRate"
              langs:
                type: array
                items:
                  type: string
                  enum:
                    - jpn
                    - eng
                    - deu
                    - fra
                    - ita
                    - rus
                    - zho
                    - kor
                    - spa
                    - etc
        extended:
          type: object
          properties: {}
        relatedItems:
          type: array
          items:
            $ref: "#/components/schemas/RelatedItem"
        series:
          type: object
          properties:
            id:
              type: integer
            repeat:
              minimum: 0
              type: integer
            pattern:
              $ref: "#/components/schemas/ProgramPattern"
            expiresAt:
              $ref: "#/components/schemas/UnixtimeMS"
            episode:
              $ref: "#/components/schemas/ProgramEpisodeNumber"
            lastEpisode:
              $ref: "#/components/schemas/ProgramEpisodeNumber"
            name:
              type: string
    ProgramGenre:
      type: object
      properties:
        lv1:
          type: integer
        lv2:
          type: integer
        un1:
          type: integer
        un2:
          type: integer
    ProgramVideoType:
      type: string
      enum:
        - mpeg2
        - h.264
        - h.265
    ProgramVideoResolution:
      type: string
      enum:
        - 240p
        - 480i
        - 480p
        - 720p
        - 1080i
        - 1080p
        - 2160p
        - 4320p
    ProgramAudioSamplingRate:
      type: integer
      enum:
        - 16000
        - 22050
        - 24000
        - 32000
        - 44100
        - 48000
    ProgramPattern:
      maximum: 7
      minimum: 0
      type: integer
    ProgramEpisodeNumber:
      maximum: 4095
      minimum: 1
      type: integer
    RelatedItem:
      type: object
      properties:
        type:
          type: string
          enum:
            - shared
            - relay
            - movement
        networkId:
          type: integer
        serviceId:
          type: integer
        eventId:
          type: integer
    TunerDevice:
      required:
        - command
        - index
        - isAvailable
        - isFault
        - isFree
        - isUsing
        - name
        - pid
        - types
        - users
      type: object
      properties:
        index:
          type: integer
        name:
          type: string
        types:
          type: array
          items:
            type: string
        command:
          type: string
        pid:
          type: integer
        users:
          type: array
          items:
            $ref: "#/components/schemas/TunerUser"
        isAvailable:
          type: boolean
        isRemote:
          type: boolean
        isFree:
          type: boolean
        isUsing:
          type: boolean
        isFault:
          type: boolean
        currentChannelType:
          type: string
        currentChannel:
          type: string
    TunerUser:
      required:
        - id
        - priority
      type: object
      properties:
        id:
          type: string
        priority:
          minimum: -1
          type: integer
        agent:
          type: string
        url:
          type: string
        disableDecoder:
          type: boolean
        streamSetting:
          required:
            - channel
          type: object
          properties:
            channel:
