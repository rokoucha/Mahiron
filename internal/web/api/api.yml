openapi: 3.1.1
info:
  title: Mahiron API
  description: Yet another DVR Tuner Server for Japanese TV
  contact:
    name: 21S1298001
    url: https://github.com/21S1298001
  version: 5.0.0
servers:
  - url: http://localhost:40772/api
tags:
  - name: channels
  - name: documents
  - name: events
  - name: iptv
  - name: job
  - name: log
  - name: misc
  - name: programs
  - name: services
  - name: status
  - name: stream
  - name: tuners
  - name: version
paths:
  /version:
    get:
      tags:
        - version
      operationId: checkVersion
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /docs:
    get:
      tags:
        - documents
      operationId: getApiDocumentation
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners:
    get:
      tags:
        - tuners
      operationId: getTuners
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TunerDevice"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /status:
    get:
      tags:
        - status
      summary: Get Status
      operationId: getStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services:
    get:
      tags:
        - services
      operationId: getServices
      parameters:
        - name: serviceId
          in: query
          schema:
            type: integer
        - name: networkId
          in: query
          schema:
            type: integer
        - name: name
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: integer
        - name: channel.type
          in: query
          schema:
            type: string
        - name: channel.channel
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /programs:
    get:
      tags:
        - programs
      operationId: getPrograms
      parameters:
        - name: networkId
          in: query
          schema:
            type: integer
        - name: serviceId
          in: query
          schema:
            type: integer
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /log/stream:
    get:
      tags:
        - log
        - stream
      operationId: getLogStream
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        default:
          description: Unexpected Error
          content: {}
  /log:
    get:
      tags:
        - log
      operationId: getLog
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        default:
          description: Unexpected Error
          content: {}
  /jobs:
    get:
      tags:
        - job
      operationId: getJobs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobItem"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /job-schedules:
    get:
      tags:
        - job
      operationId: getJobSchedules
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobScheduleItem"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/xmltv:
    get:
      tags:
        - iptv
      summary: IPTV - XMLTV EPG Data
      responses:
        "200":
          description: OK
          content:
            text/xml:
              schema:
                type: string
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/playlist:
    get:
      tags:
        - iptv
      summary: IPTV - M3U Playlist
      responses:
        "200":
          description: OK
          content:
            application/x-mpegURL:
              schema:
                type: string
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/lineup.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IptvLineupItem"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/lineup_status.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IptvLineupStatus"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /iptv/discover.json:
    get:
      tags:
        - iptv
      summary: IPTV - Media Server Support
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IptvDiscover"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events/stream:
    get:
      tags:
        - events
        - stream
      operationId: getEventsStream
      parameters:
        - name: resource
          in: query
          schema:
            type: string
            enum:
              - program
              - service
              - tuner
              - job
              - job_schedule
        - name: type
          in: query
          schema:
            type: string
            enum:
              - create
              - update
              - remove
      responses:
        "200":
          description: OK
          content:
            text/plain:
              x-ogen-raw-response: true
              schema:
                type: string
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /events:
    get:
      tags:
        - events
      operationId: getEvents
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /channels:
    get:
      tags:
        - channels
      operationId: getChannels
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: channel
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners/{index}/process:
    get:
      tags:
        - tuners
      summary: Get Tuner Process Info
      operationId: getTunerProcess
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TunerProcess"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - tuners
      summary: Kill Tuner Process
      operationId: killTunerProcess
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "204":
          description: Killed
          content: {}
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /tuners/{index}:
    get:
      tags:
        - tuners
      operationId: getTuner
      parameters:
        - name: index
          in: path
          required: true
          schema:
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TunerDevice"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services/{id}/stream:
    get:
      tags:
        - services
        - stream
      operationId: getServiceStream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: -1
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content:
            video/mp2t:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
    head:
      tags:
        - services
        - stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: -1
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}/data-broadcast/state:
    get:
      description: >-
        Returns the current data-broadcast snapshot. Modules whose status is
        "rejected" are announced for diagnostics but must be excluded from a
        receiver's DII download list because no resource will become available.
        URL fields in the payload are absolute paths rooted at the API mount;
        clients deployed through a subpath proxy should construct request URLs
        from the endpoint paths instead.
      tags:
        - services
        - stream
      operationId: getServiceDataBroadcastState
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              x-ogen-raw-response: true
              schema:
                type: string
        "404":
          description: Not Found
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}/data-broadcast/events:
    get:
      description: >-
        Streams data-broadcast state changes. Modules whose status is
        "rejected" are announced for diagnostics but must be excluded from a
        receiver's DII download list because no resource will become available.
        URL fields in event payloads are absolute paths rooted at the API mount;
        clients deployed through a subpath proxy should construct request URLs
        from the endpoint paths instead.
      tags:
        - services
        - stream
      operationId: getServiceDataBroadcastEvents
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: -1
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content:
            text/event-stream:
              x-ogen-raw-response: true
              schema:
                type: string
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}/data-broadcast/components/{componentTag}/carousels/{downloadId}/modules/{moduleId}/versions/{moduleVersion}:
    get:
      description: >-
        Returns the decoded resource manifest. contentLocation is null when the
        complete module maps directly to one module-scoped resource, and is a
        string only for a named multipart resource. rawUrl and resource url
        values are absolute paths rooted at the API mount.
      tags:
        - services
        - stream
      operationId: getServiceDataBroadcastModuleVersion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
        - name: componentTag
          in: path
          required: true
          schema:
            maximum: 255
            minimum: 0
            type: integer
        - name: downloadId
          in: path
          required: true
          schema:
            maximum: 4294967295
            minimum: 0
            type: integer
            format: int64
        - name: moduleId
          in: path
          required: true
          schema:
            maximum: 65535
            minimum: 0
            type: integer
        - name: moduleVersion
          in: path
          required: true
          schema:
            maximum: 255
            minimum: 0
            type: integer
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: OK
          headers:
            ETag:
              schema:
                type: string
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              x-ogen-raw-response: true
              schema:
                type: string
        "404":
          description: Unknown or superseded module generation
          content: {}
        "304":
          description: Not Modified
          content: {}
        "410":
          description: Module generation was evicted from the completed-module cache
          content: {}
        "425":
          description: Module generation announced but not complete
          content: {}
        "507":
          description: Module exceeds receiver resource limits
          content: {}
        "422":
          description: Module entity cannot be decoded into logical resources
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}/data-broadcast/components/{componentTag}/carousels/{downloadId}/modules/{moduleId}/versions/{moduleVersion}/raw:
    get:
      tags: [services, stream]
      operationId: getServiceDataBroadcastModuleRaw
      parameters:
        - $ref: "#/components/parameters/DataBroadcastServiceID"
        - $ref: "#/components/parameters/DataBroadcastComponentTag"
        - $ref: "#/components/parameters/DataBroadcastDownloadID"
        - $ref: "#/components/parameters/DataBroadcastModuleID"
        - $ref: "#/components/parameters/DataBroadcastModuleVersion"
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              x-ogen-raw-response: true
              schema: {type: string, format: binary}
        "404": {description: Unknown module generation}
        "304": {description: Not Modified}
        "410": {description: Module generation was evicted from the completed-module cache}
        "425": {description: Module generation announced but not complete}
  /services/{id}/data-broadcast/components/{componentTag}/carousels/{downloadId}/modules/{moduleId}/versions/{moduleVersion}/resources/{resourceId}:
    get:
      tags: [services, stream]
      operationId: getServiceDataBroadcastModuleResource
      parameters:
        - $ref: "#/components/parameters/DataBroadcastServiceID"
        - $ref: "#/components/parameters/DataBroadcastComponentTag"
        - $ref: "#/components/parameters/DataBroadcastDownloadID"
        - $ref: "#/components/parameters/DataBroadcastModuleID"
        - $ref: "#/components/parameters/DataBroadcastModuleVersion"
        - name: resourceId
          in: path
          required: true
          schema: {type: string}
        - $ref: "#/components/parameters/IfNoneMatch"
      responses:
        "200":
          description: OK
          content:
            application/octet-stream:
              x-ogen-raw-response: true
              schema: {type: string, format: binary}
        "404": {description: Unknown module generation or resource}
        "304": {description: Not Modified}
        "410": {description: Module generation was evicted from the completed-module cache}
        "425": {description: Module generation announced but not complete}
        "507": {description: Module exceeds receiver resource limits}
        "422": {description: Module entity cannot be decoded into logical resources}
  /services/{id}/programs:
    get:
      tags:
        - programs
        - services
      operationId: getServicePrograms
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Program"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /services/{id}/logo:
    get:
      tags:
        - services
      operationId: getLogoImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found
          content: {}
        "503":
          description: Logo Data Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /services/{id}:
    get:
      tags:
        - services
      operationId: getService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 6553565535
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /programs/{id}/stream:
    get:
      tags:
        - programs
        - stream
      operationId: getProgramStream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 655356553565535
            minimum: 10000000000
            type: integer
            format: int64
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: -1
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content:
            video/mp2t:
              schema:
                type: string
                format: binary
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
    head:
      tags:
        - programs
        - stream
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 655356553565535
            minimum: 10000000000
            type: integer
            format: int64
        - name: X-Mirakurun-Priority
          in: header
          schema:
            minimum: -1
            type: integer
        - name: decode
          in: query
          schema:
            maximum: 1
            minimum: 0
            type: integer
      responses:
        "200":
          description: OK
          headers:
            X-Mirakurun-Tuner-User-ID:
              schema:
                type: string
          content: {}
        "404":
          description: Not Found
          content: {}
        "503":
          description: Tuner Resource Unavailable
          content: {}
        default:
          description: Unexpected Error
          content: {}
  /programs/{id}:
    get:
      tags:
        - programs
      operationId: getProgram
      parameters:
        - name: id
          in: path
          required: true
          schema:
            maximum: 655356553565535
            minimum: 10000000000
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /jobs/{id}/rerun:
    put:
      tags:
        - job
      summary: Request to rerun a job
      operationId: rerunJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Requested
          content: {}
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /jobs/{id}/abort:
    put:
      tags:
        - job
      summary: Request to abort a job
      operationId: abortJob
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Requested
          content: {}
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /job-schedules/{key}/run:
    put:
      tags:
        - job
      summary: Request to run a job schedule
      operationId: runJobSchedule
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Requested
          content: {}
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Unexpected Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
